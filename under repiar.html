<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Under Maintenance</title>
<link rel="icon" href="assets/images/author.jpg" type="image/gif/png/jpg">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
padding:20px;
font-family:Arial, Helvetica, sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;

background:
linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.65)),
url("dark-bg.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

.container{
background:rgba(0,0,0,0.65);
padding:50px 40px;
border-radius:15px;
width:100%;
max-width:650px;
box-shadow:0 0 25px rgba(61, 61, 61, 0.6);
}

h1{
font-size:48px;
margin-bottom:15px;
}

p{
font-size:18px;
margin-bottom:25px;
opacity:0.9;
}

.timer{
display:flex;
justify-content:center;
gap:20px;
font-size:26px;
flex-wrap:wrap;
}

.time-box{
background:#ffffff15;
padding:15px 20px;
border-radius:10px;
min-width:90px;
}

.time-box span{
display:block;
font-size:36px;
font-weight:bold;
}

.footer{
margin-top:30px;
font-size:14px;
opacity:0.7;
}

/* Tablet */

@media(max-width:900px){

h1{
font-size:38px;
}

.timer{
font-size:22px;
}

.time-box span{
font-size:32px;
}

}

/* Mobile */

@media(max-width:600px){

body{
padding:15px;
}

.container{
padding:40px 25px;
}

h1{
font-size:28px;
}

p{
font-size:16px;
}

.timer{
gap:12px;
}

.time-box{
padding:12px 15px;
}

.time-box span{
font-size:26px;
}

}

/* Very small phones */

@media(max-width:400px){

.timer{
flex-direction:column;
align-items:center;
}

.time-box{
width:120px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>🚧 Website Under Maintenance</h1>

<p>We're making improvements to give you a better experience.<br>
Please come back later.</p>

<div class="timer">

<div class="time-box">
<span id="days">0</span>
Days
</div>

<div class="time-box">
<span id="hours">0</span>
Hours
</div>

<div class="time-box">
<span id="minutes">0</span>
Minutes
</div>

<div class="time-box">
<span id="seconds">0</span>
Seconds
</div>

</div>

<div class="footer">
© 2026 ANIIMS FAMILY. All rights reserved.
</div>

</div>

<script>

var countDownDate = new Date("Dec 30, 2026 12:00:00").getTime();

var x = setInterval(function(){

var now = new Date().getTime();

var distance = countDownDate - now;

var days = Math.floor(distance / (1000 * 60 * 60 * 24));
var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
var seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

if(distance < 0){
clearInterval(x);
document.querySelector(".timer").innerHTML = "Website is Live!";
}

},1000);

</script>

</body>
</html>
